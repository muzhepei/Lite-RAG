<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三国演义 · 检索与 RAG</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #c45c26;
      --accent-hover: #e07a3a;
      --score: #6ee7b7;
      --error: #f87171;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(ellipse 80% 50% at 50% -20%, #4a1c1c 0%, var(--bg) 55%);
      color: var(--text);
      line-height: 1.6;
    }

    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }

    header {
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin: 0 0 0.35rem;
      letter-spacing: -0.02em;
    }

    .sub {
      color: var(--muted);
      font-size: 0.95rem;
      margin: 0;
    }

    .search-box {
      display: flex;
      gap: 0.65rem;
      margin-bottom: 1.5rem;
    }

    #query {
      flex: 1;
      padding: 0.85rem 1rem;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    #query:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(196, 92, 38, 0.28);
    }

    #query::placeholder {
      color: var(--muted);
    }

    button {
      padding: 0.85rem 1.35rem;
      font-size: 1rem;
      font-weight: 500;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    button:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .meta {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 1rem;
      min-height: 1.4em;
    }

    .meta strong {
      color: var(--text);
    }

    .list-hint {
      font-size: 0.85rem;
      color: var(--muted);
      margin: -0.35rem 0 1rem;
      padding: 0.55rem 0.75rem;
      border-radius: 8px;
      background: rgba(110, 231, 183, 0.08);
      border: 1px solid rgba(110, 231, 183, 0.22);
      line-height: 1.5;
    }

    .list-hint[hidden] {
      display: none;
    }

    .merge-badge {
      font-size: 0.75rem;
      color: #a7f3d0;
      padding: 0.1rem 0.45rem;
      border-radius: 4px;
      background: rgba(110, 231, 183, 0.12);
    }

    .error {
      padding: 0.85rem 1rem;
      border-radius: 8px;
      background: rgba(248, 113, 113, 0.12);
      border: 1px solid rgba(248, 113, 113, 0.35);
      color: var(--error);
      margin-bottom: 1rem;
      display: none;
    }

    .error.visible {
      display: block;
    }

    .results {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .hit {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.15rem;
      margin-bottom: 0.85rem;
    }

    .hit-head {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }

    .rank {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      background: var(--bg);
      padding: 0.15rem 0.5rem;
      border-radius: 6px;
    }

    .score {
      font-size: 0.85rem;
      color: var(--score);
      font-variant-numeric: tabular-nums;
    }

    .doc-id {
      font-size: 0.75rem;
      color: var(--muted);
      word-break: break-all;
    }

    .hit-text {
      margin: 0;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .scroll-panel {
      max-height: 20rem;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 0.35rem;
      scrollbar-gutter: stable;
    }

    .scroll-panel::-webkit-scrollbar {
      width: 8px;
    }

    .scroll-panel::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    .chapter-title {
      margin: 0 0 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .snippet-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin: 0.65rem 0 0.35rem;
    }

    .chapter-full {
      margin-top: 0.5rem;
    }

    .chapter-full summary {
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--accent);
    }

    .chapter-full-text {
      margin: 0.5rem 0 0;
      font-size: 0.9rem;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 2.5rem 1rem;
    }

    .loading .results {
      opacity: 0.5;
      pointer-events: none;
    }

    .hints {
      margin: -0.5rem 0 1.25rem;
    }

    .hint-group {
      margin-bottom: 0.85rem;
    }

    .hint-group:last-child {
      margin-bottom: 0;
    }

    .hint-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.45rem;
    }

    .hint-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .hint-btn {
      padding: 0.35rem 0.75rem;
      font-size: 0.85rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .hint-btn:hover {
      color: var(--text);
      border-color: var(--accent);
      background: rgba(196, 92, 38, 0.12);
    }

    .mode-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .mode-btn {
      padding: 0.45rem 1rem;
      font-size: 0.9rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }

    .mode-btn.active {
      color: #fff;
      border-color: var(--accent);
      background: var(--accent);
    }

    .answer-box {
      display: none;
      margin-bottom: 1.25rem;
    }

    .answer-box.visible {
      display: block;
    }

    .answer-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.85rem 1.1rem 1rem;
    }

    .answer-panel summary {
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      list-style: none;
      user-select: none;
    }

    .answer-panel summary::-webkit-details-marker {
      display: none;
    }

    .answer-panel summary::before {
      content: "▸ ";
    }

    .answer-panel[open] summary::before {
      content: "▾ ";
    }

    .answer-scroll {
      margin-top: 0.65rem;
    }

    .answer-text {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 1rem;
      line-height: 1.65;
    }

    .sources-mini {
      margin-top: 0.85rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>三国演义 · 检索与 RAG</h1>
      <p class="sub">混合检索片段，或由大模型根据语料生成回答（需服务端配置 API Key）</p>
    </header>

    <div class="mode-bar" role="tablist" aria-label="检索模式">
      <button type="button" class="mode-btn active" id="modeSearch" data-mode="search">仅检索</button>
      <button type="button" class="mode-btn" id="modeRag" data-mode="rag">RAG 问答</button>
    </div>

    <form class="search-box" id="searchForm" role="search">
      <input type="search" id="query" name="q" placeholder="输入人物或典故，如：诸葛亮、温酒斩华雄、三顾茅庐" autocomplete="off" required />
      <button type="submit" id="btnSearch">检索</button>
    </form>

    <div class="answer-box" id="answerBox" aria-live="polite">
      <details class="answer-panel" id="answerPanel" open>
        <summary>RAG 回答（点击收起/展开）</summary>
        <div class="answer-scroll scroll-panel" id="answerScroll">
          <p class="answer-text" id="answerText"></p>
        </div>
      </details>
      <p class="sources-mini" id="sourcesMini"></p>
    </div>

    <div class="hints" id="ragHints" aria-label="RAG 预设问题" hidden>
      <div class="hint-group">
        <span class="hint-label">预设问题</span>
        <div class="hint-row">
          <button type="button" class="hint-btn" data-q="桃园三结义是哪三人">桃园三结义是哪三人</button>
          <button type="button" class="hint-btn" data-q="火烧连营是谁放的火">火烧连营是谁放的火</button>
          <button type="button" class="hint-btn" data-q="定军山死的最高曹军将领是谁">定军山死的最高曹军将领是谁</button>
          <button type="button" class="hint-btn" data-q="郭嘉最大的功绩是什么">郭嘉最大的功绩是什么</button>
          <button type="button" class="hint-btn" data-q="空城计吓退了谁">空城计吓退了谁</button>
          <button type="button" class="hint-btn" data-q="李白是谁">李白是谁</button>
          <button type="button" class="hint-btn" data-q="书里面最精彩的部分是哪些">书里面最精彩的部分是哪些</button>
        </div>
      </div>
    </div>

    <div class="hints" id="searchHints" aria-label="人物与典故快速检索">
      <div class="hint-group">
        <span class="hint-label">人物</span>
        <div class="hint-row">
          <button type="button" class="hint-btn" data-q="刘备">刘备</button>
          <button type="button" class="hint-btn" data-q="关羽">关羽</button>
          <button type="button" class="hint-btn" data-q="张飞">张飞</button>
          <button type="button" class="hint-btn" data-q="诸葛亮">诸葛亮</button>
          <button type="button" class="hint-btn" data-q="曹操">曹操</button>
          <button type="button" class="hint-btn" data-q="周瑜">周瑜</button>
          <button type="button" class="hint-btn" data-q="赵云">赵云</button>
          <button type="button" class="hint-btn" data-q="吕布">吕布</button>
        </div>
      </div>
      <div class="hint-group">
        <span class="hint-label">典故</span>
        <div class="hint-row">
          <button type="button" class="hint-btn" data-q="温酒斩华雄">温酒斩华雄</button>
          <button type="button" class="hint-btn" data-q="三顾茅庐">三顾茅庐</button>
          <button type="button" class="hint-btn" data-q="草船借箭">草船借箭</button>
          <button type="button" class="hint-btn" data-q="赤壁之战">赤壁之战</button>
          <button type="button" class="hint-btn" data-q="空城计">空城计</button>
          <button type="button" class="hint-btn" data-q="单刀赴会">单刀赴会</button>
          <button type="button" class="hint-btn" data-q="长坂坡">长坂坡</button>
          <button type="button" class="hint-btn" data-q="张辽威震逍遥津">张辽威震逍遥津</button>
        </div>
      </div>
    </div>

    <div class="error" id="errorBox" role="alert"></div>
    <p class="meta" id="meta" aria-live="polite"></p>
    <p class="list-hint" id="listHint" hidden aria-live="polite"></p>
    <ul class="results" id="results"></ul>
  </div>

  <script>
    const form = document.getElementById("searchForm");
    const input = document.getElementById("query");
    const btn = document.getElementById("btnSearch");
    const meta = document.getElementById("meta");
    const listHint = document.getElementById("listHint");
    const resultsEl = document.getElementById("results");
    const errorBox = document.getElementById("errorBox");
    const wrap = document.querySelector(".wrap");
    const answerBox = document.getElementById("answerBox");
    const answerText = document.getElementById("answerText");
    const answerScroll = document.getElementById("answerScroll");
    const sourcesMini = document.getElementById("sourcesMini");
    const modeSearch = document.getElementById("modeSearch");
    const modeRag = document.getElementById("modeRag");
    const searchHints = document.getElementById("searchHints");
    const ragHints = document.getElementById("ragHints");

    let currentMode = "search";

    function setMode(mode) {
      currentMode = mode;
      const isRag = mode === "rag";
      modeSearch.classList.toggle("active", !isRag);
      modeRag.classList.toggle("active", isRag);
      btn.textContent = isRag ? "问答" : "检索";
      input.placeholder = isRag
        ? "输入问题，如：草船借箭是谁出的计？"
        : "输入人物或典故，如：诸葛亮、温酒斩华雄、三顾茅庐";
      searchHints.hidden = isRag;
      ragHints.hidden = !isRag;
      if (!isRag) {
        answerBox.classList.remove("visible");
      }
    }

    document.querySelector(".mode-bar").addEventListener("click", (e) => {
      const b = e.target.closest(".mode-btn");
      if (!b) return;
      setMode(b.getAttribute("data-mode") || "search");
    });

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.add("visible");
    }

    function hideError() {
      errorBox.textContent = "";
      errorBox.classList.remove("visible");
    }

    function formatScore(score) {
      if (score == null || Number.isNaN(Number(score))) return "—";
      return Number(score).toFixed(4);
    }

    function hitScore(h) {
      const s = Number(h?.score);
      return Number.isFinite(s) ? s : 0;
    }

    /** 同 chapter_id 只保留相关度最高的一条，并记录合并段数 */
    function dedupeHitsByChapter(hits) {
      const raw = Array.isArray(hits) ? hits : [];
      const noChapter = [];
      const byChapter = new Map();

      for (const h of raw) {
        if (!h || typeof h !== "object") continue;
        const cid = h.chapter_id;
        if (cid == null || String(cid).trim() === "") {
          noChapter.push({ ...h, merged_from: 1 });
          continue;
        }
        const key = String(cid);
        const prev = byChapter.get(key);
        if (!prev || hitScore(h) > hitScore(prev)) {
          const mergedFrom = (prev?.merged_from || 0) + 1;
          byChapter.set(key, { ...h, merged_from: mergedFrom });
        } else {
          prev.merged_from = (prev.merged_from || 1) + 1;
        }
      }

      const merged = [...byChapter.values(), ...noChapter];
      merged.sort((a, b) => hitScore(b) - hitScore(a));
      merged.forEach((h, i) => {
        h.rank = i + 1;
      });

      return {
        hits: merged,
        rawCount: raw.length,
        dedupedCount: merged.length,
        removedCount: Math.max(0, raw.length - merged.length),
      };
    }

    function setListHint(text) {
      if (!text) {
        listHint.hidden = true;
        listHint.textContent = "";
        return;
      }
      listHint.hidden = false;
      listHint.textContent = text;
    }

    function sourcesToHits(sources) {
      return (sources || []).map((s, i) => {
        const ch = s.chapter || {};
        const fullFromEs = (ch.full_text || "").trim();
        const body = (
          fullFromEs ||
          (s.text || s.text_preview || "").trim()
        );
        const llmTruncated = Boolean(s.text_truncated);
        const total = s.text_total_chars != null ? s.text_total_chars : body.length;
        return {
          rank: s.ref != null ? s.ref : i + 1,
          id: s.id,
          score: s.score,
          chapter_id: s.chapter_id,
          chunk_index: s.chunk_index,
          text: body,
          text_truncated: llmTruncated,
          llm_truncated: llmTruncated,
          text_total_chars: total,
          source_kind: s.source_kind,
          chapter_title: s.chapter_title || ch.title,
          chapter: ch.full_text ? ch : undefined,
          hit_count: s.hit_count,
          merged_from: s.hit_count != null && s.hit_count > 1 ? s.hit_count : 1,
        };
      });
    }

    function renderHits(data, options = {}) {
      const { dedupe = true, showScore = currentMode === "rag" } = options;
      let hits = data.hits || [];
      let dedupeInfo = null;

      if (dedupe) {
        dedupeInfo = dedupeHitsByChapter(hits);
        hits = dedupeInfo.hits;
        if (dedupeInfo.removedCount > 0) {
          setListHint(
            options.hintPrefix
              ? `${options.hintPrefix} 已按章节去重：展示 ${dedupeInfo.dedupedCount} 条（ES 返回 ${dedupeInfo.rawCount} 条，合并同章 ${dedupeInfo.removedCount} 条）。`
              : `已按章节去重：展示 ${dedupeInfo.dedupedCount} 条（ES 返回 ${dedupeInfo.rawCount} 条，合并同章 ${dedupeInfo.removedCount} 条）。同章仅保留相关度最高的一段。`
          );
        } else if (options.hintPrefix) {
          setListHint(options.hintPrefix);
        } else {
          setListHint("");
        }
      } else if (options.hintPrefix) {
        setListHint(options.hintPrefix);
      } else {
        setListHint("");
      }

      if (hits.length === 0) {
        resultsEl.innerHTML =
          '<li class="empty">演义中未找到相关段落，可换人物名、典故或名场面再试。</li>';
        return;
      }

      resultsEl.innerHTML = hits
        .map((h) => {
          const ch = h.chapter || {};
          const title =
            h.chapter_title ||
            ch.title ||
            (ch.chapter_number != null ? `第 ${ch.chapter_number} 回` : "") ||
            (h.chapter_id ? String(h.chapter_id) : "");
          const titleHtml = title
            ? `<p class="chapter-title">${escapeHtml(title)}</p>`
            : "";
          const extra = [];
          if (h.source_kind === "chapter_summary") extra.push("章回摘要");
          else if (h.source_kind === "chapter") extra.push("整章");
          else if (h.source_kind === "chunk") extra.push("片段");
          if (h.chapter_id != null && !ch.title && !h.chapter_title) {
            extra.push(`章节 ${h.chapter_id}`);
          }
          if (h.chunk_index != null && h.source_kind !== "chapter") {
            extra.push(`片段 ${h.chunk_index}`);
          }
          const extraHtml = extra.length
            ? `<span class="doc-id">${extra.join(" · ")}</span>`
            : "";
          const idHtml = h.id
            ? `<span class="doc-id">${escapeHtml(String(h.id))}</span>`
            : "";
          const mergeHtml =
            h.merged_from > 1
              ? `<span class="merge-badge">同章 ${h.merged_from} 段已合并</span>`
              : "";
          let trunc = "";
          if (h.llm_truncated || h.text_truncated) {
            const total = h.text_total_chars;
            trunc =
              h.source_kind === "chapter_summary"
                ? "（送入大模型时摘要可能被截断，下方为 ES 整章全文）"
                : h.source_kind === "chapter"
                  ? total != null
                    ? `（送入大模型时已截断，下方为 ES 整章约 ${total} 字）`
                    : "（送入大模型时已截断，下方为 ES 整章全文）"
                  : "（送入大模型时已截断）";
          }
          const fullText = (ch.full_text || "").trim();
          const bodyText = (h.text || "").trim();
          const chunkLabel =
            ch.chunk_count != null ? `${ch.chunk_count} 段` : "全文";
          const showSnippet =
            bodyText &&
            (!fullText || bodyText.length < fullText.length - 80);
          let bodyHtml = "";
          let chapterFullHtml = "";
          if (fullText) {
            const openFull = !showSnippet ? " open" : "";
            chapterFullHtml = `<details class="chapter-full"${openFull}>
              <summary>展开 ES 整章正文（${chunkLabel}）</summary>
              <p class="chapter-full-text scroll-panel">${escapeHtml(fullText)}</p>
            </details>`;
          }
          if (showSnippet) {
            bodyHtml = `<p class="snippet-label">${escapeHtml(
              h.source_kind === "chapter_summary"
                ? "章回摘要（送入模型）"
                : "命中片段"
            )}</p>
              <p class="hit-text scroll-panel">${escapeHtml(bodyText)}${trunc}</p>`;
          } else if (bodyText && !fullText) {
            bodyHtml = `<p class="snippet-label">${escapeHtml(
              h.source_kind === "chapter" ? "整章正文（ES 全文）" : "正文"
            )}</p>
              <details class="chapter-full" open>
              <summary>正文（点击收起）</summary>
              <p class="chapter-full-text scroll-panel">${escapeHtml(bodyText)}${trunc}</p>
            </details>`;
          }
          const scoreHtml = showScore
            ? `<span class="score">相关度 ${formatScore(h.score)}</span>`
            : "";
          return `
            <li class="hit">
              <div class="hit-head">
                <span class="rank">#${h.rank}</span>
                ${scoreHtml}
                ${mergeHtml}
                ${extraHtml}
                ${idHtml}
              </div>
              ${titleHtml}
              ${bodyHtml}
              ${chapterFullHtml}
            </li>`;
        })
        .join("");
    }

    function scrollPanelToBottom(el) {
      if (!el) return;
      el.scrollTop = el.scrollHeight;
    }

    function setAnswerContent(text) {
      answerText.textContent = text;
      scrollPanelToBottom(answerScroll);
    }

    function escapeHtml(s) {
      return s
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function parseApiError(data) {
      const detail = data.detail;
      if (typeof detail === "string") return detail;
      if (Array.isArray(detail)) {
        return detail.map((d) => d.msg || JSON.stringify(d)).join("; ");
      }
      return "请求失败";
    }

    /** 解析单行 SSE：``data: {...}``（兼容 ``data:{...}``） */
    function parseSseDataLine(line) {
      const s = line.trim();
      if (!s.startsWith("data:")) return null;
      const payload = s.startsWith("data: ") ? s.slice(6) : s.slice(5).trim();
      if (!payload) return null;
      try {
        return JSON.parse(payload);
      } catch {
        return null;
      }
    }

    /** 从 SSE 文本中提取并处理所有 ``data:`` 事件（兼容 ``\\r\\n`` 换行） */
    function processSseChunk(text, handlers) {
      const normalized = text.replace(/\r\n/g, "\n");
      const blocks = normalized.split(/\n\n+/);
      for (const block of blocks) {
        const lines = block.split("\n");
        for (const line of lines) {
          const data = parseSseDataLine(line);
          if (data) handlers.onEvent(data);
        }
      }
    }

    async function consumeRagStream(res) {
      const ct = res.headers.get("content-type") || "";
      const isSse =
        ct.includes("text/event-stream") || ct.includes("text/plain");

      if (!res.ok) {
        const text = await res.text();
        if (isSse || text.trimStart().startsWith("data:")) {
          let errMsg = "";
          processSseChunk(text, {
            onEvent(data) {
              if (data.event === "error" && data.message) {
                errMsg = data.message;
              }
            },
          });
          if (errMsg) throw new Error(errMsg);
        }
        if (ct.includes("application/json") && !text.trimStart().startsWith("data:")) {
          try {
            const data = JSON.parse(text);
            throw new Error(parseApiError(data));
          } catch (e) {
            if (!(e instanceof SyntaxError)) throw e;
          }
        }
        throw new Error(text.trim() || `请求失败 (${res.status})`);
      }

      setAnswerContent("");
      answerBox.classList.add("visible");
      meta.textContent = "检索完成，正在生成…";

      let fullAnswer = "";
      let metaData = null;
      let retrievalData = null;
      let sawDone = false;

      function handleEvent(data) {
        if (data.event === "meta") {
          metaData = data;
          meta.innerHTML =
            `RAG「<strong>${escapeHtml(data.query || "")}</strong>」` +
            ` · 模型 <strong>${escapeHtml(data.model || "—")}</strong>` +
            ` · 检索 <strong>${data.retrieval_returned ?? "—"}</strong> 段`;
        } else if (data.event === "retrieval" && data.retrieval) {
          retrievalData = data.retrieval;
          renderHits(retrievalData, {
            hintPrefix:
              "以下为 ES 检索池（生成回答前会再章级聚合，通常仅取前 3 条送入模型）。",
          });
        } else if (data.event === "delta" && data.content) {
          fullAnswer += data.content;
          setAnswerContent(fullAnswer);
        } else if (data.event === "done") {
          sawDone = true;
          if (data.answer) {
            fullAnswer = data.answer;
            setAnswerContent(fullAnswer);
          }
          const src = data.sources || [];
          sourcesMini.textContent = src.length
            ? "引用 " +
            src
              .map((s) => `[${s.ref}] ${(s.text_preview || "").slice(0, 40)}…`)
              .join(" · ")
            : "";
          if (metaData) {
            meta.innerHTML =
              `RAG「<strong>${escapeHtml(metaData.query || "")}</strong>」` +
              ` · 模型 <strong>${escapeHtml(metaData.model || "—")}</strong>` +
              ` · 检索 <strong>${metaData.retrieval_returned ?? "—"}</strong> 段`;
          }
          if (src.length > 0) {
            renderHits(
              { hits: sourcesToHits(src) },
              {
                dedupe: false,
                showScore: true,
                hintPrefix: `以下为 RAG 引用（${src.length} 条）：列表展示 ES 整章/原文，不受 ES2VEC_RAG_MAX_CONTEXT_CHARS 限制；仅送入大模型的内容可能更短。`,
              }
            );
          } else if (retrievalData) {
            renderHits(retrievalData, {
              hintPrefix: "以下为 ES 检索结果（未收到聚合引用，已按章去重展示）。",
            });
          } else if (!resultsEl.children.length) {
            setListHint("");
            resultsEl.innerHTML =
              '<li class="empty">回答已生成；可在 OpenAPI /api/v1/rag?debug=1 查看完整检索列表。</li>';
          }
        } else if (data.event === "error") {
          throw new Error(data.message || "RAG 生成失败");
        }
      }

      const body = res.body;
      if (!body || typeof body.getReader !== "function") {
        const text = await res.text();
        processSseChunk(text, { onEvent: handleEvent });
      } else {
        const reader = body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const normalized = buffer.replace(/\r\n/g, "\n");
          const lastSep = normalized.lastIndexOf("\n\n");
          if (lastSep < 0) continue;
          const complete = normalized.slice(0, lastSep + 2);
          buffer = normalized.slice(lastSep + 2);
          processSseChunk(complete, { onEvent: handleEvent });
        }
        if (buffer.trim()) {
          processSseChunk(buffer, { onEvent: handleEvent });
        }
      }

      if (!sawDone) {
        if (fullAnswer.trim()) {
          setAnswerContent(fullAnswer);
          sourcesMini.textContent = "（流式连接提前结束，以上为已生成片段）";
        } else {
          throw new Error("RAG 未返回完整结果，请确认已 docker compose build web 并重建容器，且 .env 中 DASHSCOPE_API_KEY 有效");
        }
      }
    }

    async function doSearch(q) {
      hideError();
      wrap.classList.add("loading");
      btn.disabled = true;
      meta.textContent = currentMode === "rag" ? "检索并生成中…" : "检索中…";
      setListHint("");
      resultsEl.innerHTML = "";
      if (currentMode !== "rag") {
        answerBox.classList.remove("visible");
      }

      try {
        if (currentMode === "rag") {
          const res = await fetch("/api/v1/rag?stream=true&debug=true", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Accept: "text/event-stream",
            },
            body: JSON.stringify({ query: q }),
          });
          await consumeRagStream(res);
        } else {
          const params = new URLSearchParams({ q, k: "10", include_chapter: "true" });
          const res = await fetch(`/api/search?${params}`);
          const data = await res.json();
          if (!res.ok) throw new Error(parseApiError(data));
          meta.innerHTML =
            `《三国演义》检索「<strong>${escapeHtml(data.query)}</strong>」` +
            ` · 返回 <strong>${data.returned}</strong> 段（约 ${data.total} 条相关）`;
          renderHits(data, {
            hintPrefix:
              "仅检索模式：结果来自 Elasticsearch，已按章节去重（同章只显示相关度最高的一段）。",
          });
        }
      } catch (err) {
        showError(err.message || "网络错误，请稍后重试");
        meta.textContent = "";
        setListHint("");
        answerBox.classList.remove("visible");
      } finally {
        wrap.classList.remove("loading");
        btn.disabled = false;
      }
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const q = input.value.trim();
      if (!q) return;
      doSearch(q);
    });

    function bindHintClicks(container) {
      container.addEventListener("click", (e) => {
        const hintBtn = e.target.closest(".hint-btn");
        if (!hintBtn) return;
        const q = hintBtn.getAttribute("data-q");
        if (!q) return;
        if (container === ragHints && currentMode !== "rag") {
          setMode("rag");
        }
        input.value = q;
        doSearch(q);
      });
    }
    bindHintClicks(searchHints);
    bindHintClicks(ragHints);

    const initialQ = new URLSearchParams(location.search).get("q");
    if (initialQ) {
      input.value = initialQ;
      doSearch(initialQ.trim());
    }
  </script>
</body>

</html>
